<!DOCTYPE html>
<html>
<head>
  <title>My Cart</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #eee; }
    nav { background: #222; padding: 10px; margin-bottom: 20px; }
    nav a { color: white; margin-right: 15px; text-decoration: none; }
    .item { background: white; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .item button { padding: 6px 12px; background: red; color: white; border: none; cursor: pointer; }
    .total { font-size: 18px; font-weight: bold; margin: 15px 0; }
    .order-btn { padding: 10px 20px; background: green; color: white; border: none; cursor: pointer; font-size: 15px; }
    #msg { padding: 8px; margin-bottom: 10px; display: none; }
    .success { background: #d4edda; color: green; display: block !important; }
    .error { background: #f8d7da; color: red; display: block !important; }
  </style>
</head>
<body>

<nav>
  <a href="/index.html">Home</a>
  <a href="/cart.html">Cart</a>
  <a href="#" onclick="logout()">Logout</a>
</nav>

<h2>My Cart</h2>
<div id="msg"></div>
<div id="items"></div>
<div id="totalBox" style="display:none">
  <div class="total">Total: ETB <span id="total">0</span></div>
  <button class="order-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login.html';

  function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login.html';
  }

  function showMsg(text, type) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = type;
    setTimeout(() => msg.className = '', 3000);
  }

  async function loadCart() {
    const res = await fetch('/api/cart', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const items = await res.json();
    const container = document.getElementById('items');
    container.innerHTML = '';

    if (items.length === 0) {
      container.innerHTML = '<p>Your cart is empty. <a href="/index.html">Shop now</a></p>';
      document.getElementById('totalBox').style.display = 'none';
      return;
    }

    let total = 0;
    items.forEach(item => {
      total += item.price * item.quantity;
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div>
          <strong>${item.name}</strong><br>
          <small>Qty: ${item.quantity} | ETB ${Number(item.price).toLocaleString()}</small>
        </div>
        <button onclick="removeItem(${item.id})">Remove</button>
      `;
      container.appendChild(div);
    });

    document.getElementById('total').textContent = Number(total).toLocaleString();
    document.getElementById('totalBox').style.display = 'block';
  }

  async function removeItem(id) {
    const res = await fetch(`/api/cart/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) { showMsg('Item removed', 'success'); loadCart(); }
  }

  async function placeOrder() {
    const res = await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Order placed!', 'success');
      setTimeout(() => loadCart(), 1500);
    } else {
      showMsg(data.message, 'error');
    }
  }

  loadCart();
</script>
</body>
</html>
