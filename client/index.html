<!DOCTYPE html>
<html>
<head>
  <title>ShopEasy</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #eee; }
    nav { background: #222; padding: 10px; margin-bottom: 20px; }
    nav a { color: white; margin-right: 15px; text-decoration: none; }
    .products { display: flex; flex-wrap: wrap; gap: 15px; }
    .card { background: white; padding: 10px; width: 200px; }
    .card img { width: 100%; height: 140px; object-fit: cover; }
    .card h3 { margin: 8px 0 4px; font-size: 14px; }
    .card p { font-size: 12px; color: gray; }
    .card .price { color: red; font-weight: bold; margin: 5px 0; }
    .card button { width: 100%; padding: 7px; background: #222; color: white; border: none; cursor: pointer; }
    #msg { padding: 8px; margin-bottom: 10px; display: none; }
    .success { background: #d4edda; color: green; display: block !important; }
    .error { background: #f8d7da; color: red; display: block !important; }
  </style>
</head>
<body>

<nav>
  <a href="/index.html">Home</a>
  <a href="/cart.html">Cart</a>
  <a href="/login.html" id="loginLink">Login</a>
  <a href="#" id="logoutLink" style="display:none" onclick="logout()">Logout</a>
</nav>

<h2>Products</h2>
<div id="msg"></div>
<div class="products" id="products"></div>

<script>
  const token = localStorage.getItem('token');
  if (token) {
    document.getElementById('loginLink').style.display = 'none';
    document.getElementById('logoutLink').style.display = 'inline';
  }

  function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login.html';
  }

  function showMsg(text, type) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = type;
    setTimeout(() => msg.className = '', 3000);
  }

  async function loadProducts() {
    const res = await fetch('/api/products');
    const data = await res.json();
    const container = document.getElementById('products');

    data.forEach(p => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <img src="${p.image_url}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <div class="price">ETB ${Number(p.price).toLocaleString()}</div>
        <p style="font-size:12px">Stock: ${p.stock}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      `;
      container.appendChild(div);
    });
  }

  async function addToCart(id) {
    if (!token) return window.location.href = '/login.html';
    const res = await fetch('/api/cart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ product_id: id, quantity: 1 })
    });
    const data = await res.json();
    showMsg(res.ok ? 'Added to cart!' : data.message, res.ok ? 'success' : 'error');
  }

  loadProducts();
</script>
</body>
</html>
