<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShopEasy</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    nav { background: #333; padding: 10px; margin-bottom: 20px; }
    nav a { color: white; text-decoration: none; margin-right: 15px; }
    .products { display: flex; flex-wrap: wrap; gap: 15px; }
    .card { background: white; padding: 15px; width: 200px; border: 1px solid #ddd; }
    .card h3 { margin-bottom: 8px; }
    .card p { font-size: 13px; color: #555; }
    .card .price { font-weight: bold; color: red; margin: 8px 0; }
    .card button { padding: 7px 12px; background: #333; color: white; border: none; cursor: pointer; }
    .msg { padding: 8px; margin-bottom: 10px; display: none; }
    .success { background: #d4edda; color: green; display: block; }
    .error { background: #f8d7da; color: red; display: block; }
  </style>
</head>
<body>

  <nav>
    <a href="/index.html">Home</a>
    <a href="/cart.html">Cart</a>
    <a href="/login.html" id="loginLink">Login</a>
    <a href="#" id="logoutLink" style="display:none" onclick="logout()">Logout</a>
  </nav>

  <h2>Products</h2>
  <div id="msg" class="msg"></div>
  <div class="products" id="products"></div>

  <script>
    const token = localStorage.getItem('token');

    if (token) {
      document.getElementById('loginLink').style.display = 'none';
      document.getElementById('logoutLink').style.display = 'inline';
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = `msg ${type}`;
      setTimeout(() => msg.className = 'msg', 3000);
    }

    async function loadProducts() {
      const res = await fetch('/api/products');
      const products = await res.json();
      const container = document.getElementById('products');

      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${p.name}</h3>
          <p>${p.description}</p>
          <div class="price">$${p.price}</div>
          <p>Stock: ${p.stock}</p>
          <button onclick="addToCart(${p.id})">Add to Cart</button>
        `;
        container.appendChild(card);
      });
    }

    async function addToCart(id) {
      if (!token) return window.location.href = '/login.html';

      const res = await fetch('/api/cart', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ product_id: id, quantity: 1 })
      });

      const data = await res.json();
      showMsg(res.ok ? 'Added to cart!' : data.message, res.ok ? 'success' : 'error');
    }

    loadProducts();
  </script>
</body>
</html>
