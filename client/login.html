<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; margin: 60px auto; max-width: 350px; }
    input { width: 100%; padding: 9px; margin-bottom: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    button { width: 100%; padding: 9px; background: #222; color: white; border: none; cursor: pointer; }
    .tabs { display: flex; margin-bottom: 20px; }
    .tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; border-bottom: 2px solid #ccc; }
    .tab.active { border-bottom: 2px solid #222; font-weight: bold; }
    .form { display: none; }
    .form.active { display: block; }
    #loginMsg, #regMsg { padding: 8px; margin-bottom: 10px; display: none; }
    .success { background: #d4edda; color: green; display: block !important; }
    .error { background: #f8d7da; color: red; display: block !important; }
  </style>
</head>
<body>

<h2>ShopEasy</h2>

<div class="tabs">
  <div class="tab active" onclick="switchTab('login', this)">Login</div>
  <div class="tab" onclick="switchTab('register', this)">Register</div>
</div>

<div class="form active" id="loginForm">
  <div id="loginMsg"></div>
  <input type="email" id="lemail" placeholder="Email">
  <input type="password" id="lpassword" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="form" id="registerForm">
  <div id="regMsg"></div>
  <input type="text" id="rusername" placeholder="Username">
  <input type="email" id="remail" placeholder="Email">
  <input type="password" id="rpassword" placeholder="Password">
  <button onclick="register()">Register</button>
</div>

<script>
  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(name + 'Form').classList.add('active');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = type;
  }

  async function login() {
    const email = document.getElementById('lemail').value;
    const password = document.getElementById('lpassword').value;
    if (!email || !password) return showMsg('loginMsg', 'Fill in all fields', 'error');

    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('token', data.token);
      showMsg('loginMsg', 'Login successful!', 'success');
      setTimeout(() => window.location.href = '/index.html', 1000);
    } else {
      showMsg('loginMsg', data.message, 'error');
    }
  }

  async function register() {
    const username = document.getElementById('rusername').value;
    const email = document.getElementById('remail').value;
    const password = document.getElementById('rpassword').value;

    if (!username || !email || !password) return showMsg('regMsg', 'Fill in all fields', 'error');
    if (username.length < 3) return showMsg('regMsg', 'Username must be at least 3 characters', 'error');
    if (!email.includes('@')) return showMsg('regMsg', 'Enter a valid email', 'error');
    if (password.length < 6) return showMsg('regMsg', 'Password must be at least 6 characters', 'error');

    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password, role: 'user' })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('regMsg', 'Account created! Please login.', 'success');
      setTimeout(() => switchTab('login', document.querySelector('.tab')), 1500);
    } else {
      showMsg('regMsg', data.message, 'error');
    }
  }
</script>
</body>
</html>
