<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    nav { background: #333; padding: 10px; margin-bottom: 20px; }
    nav a { color: white; text-decoration: none; margin-right: 15px; }
    .product { background: white; padding: 20px; max-width: 500px; border: 1px solid #ddd; }
    .product h2 { margin-bottom: 10px; }
    .product p { color: #555; margin-bottom: 8px; }
    .price { font-weight: bold; color: red; font-size: 22px; margin: 10px 0; }
    button { padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; }
    .msg { padding: 8px; margin-bottom: 10px; display: none; }
    .success { background: #d4edda; color: green; display: block; }
    .error { background: #f8d7da; color: red; display: block; }
  </style>
</head>
<body>

  <nav>
    <a href="/index.html">Home</a>
    <a href="/cart.html">Cart</a>
    <a href="/login.html" id="loginLink">Login</a>
    <a href="#" id="logoutLink" style="display:none" onclick="logout()">Logout</a>
  </nav>

  <div id="msg" class="msg"></div>
  <div class="product" id="product"></div>

  <script>
    const token = localStorage.getItem('token');

    if (token) {
      document.getElementById('loginLink').style.display = 'none';
      document.getElementById('logoutLink').style.display = 'inline';
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = `msg ${type}`;
      setTimeout(() => msg.className = 'msg', 3000);
    }

    async function loadProduct() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) return window.location.href = '/index.html';

      const res = await fetch(`/api/products/${id}`);
      const p = await res.json();

      document.getElementById('product').innerHTML = `
        <h2>${p.name}</h2>
        <p>${p.description}</p>
        <div class="price">$${p.price}</div>
        <p>Stock: ${p.stock}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      `;
    }

    async function addToCart(id) {
      if (!token) return window.location.href = '/login.html';

      const res = await fetch('/api/cart', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ product_id: id, quantity: 1 })
      });

      const data = await res.json();
      showMsg(res.ok ? 'Added to cart!' : data.message, res.ok ? 'success' : 'error');
    }

    loadProduct();
  </script>
</body>
</html>
