<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 50px auto; max-width: 400px; }
    h2 { margin-bottom: 20px; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #333; color: white; border: none; cursor: pointer; }
    a { display: block; margin-top: 10px; text-align: center; }
    .msg { padding: 8px; margin-bottom: 10px; display: none; }
    .success { background: #d4edda; color: green; display: block; }
    .error { background: #f8d7da; color: red; display: block; }
  </style>
</head>
<body>

  <h2>Register</h2>
  <div id="msg" class="msg"></div>
  <input type="text" id="username" placeholder="Username" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button onclick="register()">Register</button>
  <a href="/login.html">Already have an account? Login</a>

  <script>
    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = `msg ${type}`;
    }

    async function register() {
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, role: 'user' })
      });

      const data = await res.json();

      if (res.ok) {
        showMsg('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/login.html', 1500);
      } else {
        showMsg(data.message, 'error');
      }
    }
  </script>
</body>
</html>
